{% extends 'base.html' %}
{% block title %}Set new password - VulnShop{% endblock %}
{% block content %}
<div class="panel" style="max-width:460px;margin:auto">
<div class="policy-box">
  <p><strong>Password policy:</strong></p>
  <ul>
    <li>at least one upper-case character</li>
    <li>at least one lower-case character</li>
    <li>at least one digit</li>
    <li>minimum 10 characters</li>
  </ul>
</div>
<form method="post"><input name="password" placeholder="New password" type="password" minlength="10" required><button class="btn">Save password</button></form>
<p class="muted">token={{token}}</p>
</div>
{% endblock %}
