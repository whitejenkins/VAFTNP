<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}VulnShop{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="nav">
    <a class="brand" href="/">VulnShop</a>
    <div class="links">
      <a href="/">Catalog</a>
      <a href="/cart">Cart <span class="badge">{{ cart_count|default(0) }}</span></a>
      {% if session.get('username') %}
        <a href="/account/dashboard">Dashboard</a>
        <a href="/auth/logout">Logout</a>
      {% else %}
        <a href="/auth/login">Login</a>
        <a href="/auth/register">Sign up</a>
      {% endif %}
    </div>
  </div>
  <main class="container">{% block content %}{% endblock %}</main>
  <div class="footer">VulnShop lab • realistic insecure e-commerce training app</div>
</body>
</html>
