{% extends 'base.html' %}
{% block title %}Login - VulnShop{% endblock %}
{% block content %}
<div class="panel" style="max-width:460px;margin:auto">
  <h1>Login</h1>
  <form method="post" id="login-form">
    <input id="username" name="username" placeholder="Username" autocomplete="username" required>
    <input name="password" placeholder="Password" type="password" autocomplete="current-password" required>
    <button class="btn">Sign in</button>
  </form>
  <a href="/auth/forgot">Forgot password?</a>
</div>
{% endblock %}
