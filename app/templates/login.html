{% extends 'base.html' %}
{% block title %}Вход - VulnShop{% endblock %}
{% block content %}
<div class="panel" style="max-width:460px;margin:auto">
  <h1>Вход</h1>
  <form method="post">
    <input name="username" placeholder="username">
    <input name="password" placeholder="password" type="password">
    <input name="admin_otp" placeholder="admin otp (admins only)">
    <button class="btn">Sign in</button>
  </form>
  <a href="/auth/forgot">Забыли пароль?</a>
</div>
{% endblock %}
