{% extends 'base.html' %}
{% block title %}2FA - VulnShop{% endblock %}
{% block content %}
<div class="panel" style="max-width:460px;margin:auto">
  <h1>Two-factor verification</h1>
  <p class="muted">OTP rotates every 10 minutes.</p>
  {% if demo_code %}
  <p class="muted">Demo OTP for lab: <span class="kbd">{{ demo_code }}</span></p>
  {% endif %}
  <form method="post"><input name="code" placeholder="2FA code" required><button class="btn">Verify</button></form>
</div>
{% endblock %}
