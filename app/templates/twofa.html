{% extends 'base.html' %}
{% block title %}2FA - VulnShop{% endblock %}
{% block content %}
<div class="panel" style="max-width:460px;margin:auto">
  <h1>Two-factor verification</h1>
  <p id="twofa-error" class="error" style="display:none"></p>
  <form method="post" id="twofa-form">
    <input
      name="code"
      placeholder="2FA code"
      required
      inputmode="numeric"
      pattern="[0-9]{4}"
      maxlength="4"
      minlength="4"
      autocomplete="one-time-code"
    >
    <button class="btn">Verify</button>
  </form>
</div>
<script>
  document.getElementById("twofa-form").addEventListener("submit", async (event) => {
    event.preventDefault();
    const form = event.currentTarget;
    const errorNode = document.getElementById("twofa-error");
    errorNode.style.display = "none";
    errorNode.textContent = "";

    const response = await fetch("/auth/2fa", {
      method: "POST",
      body: new FormData(form),
      credentials: "same-origin",
    });

    if (response.redirected) {
      window.location.href = response.url;
      return;
    }

    if (!response.ok) {
      let message = "Invalid OTP code.";
      try {
        const payload = await response.json();
        message = payload.error || message;
      } catch (e) {
        // fallback to default message
      }
      errorNode.textContent = message;
      errorNode.style.display = "block";
    }
  });
</script>
{% endblock %}
