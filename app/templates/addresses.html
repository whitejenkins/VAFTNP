{% extends 'base.html' %}
{% block title %}Saved Addresses - VulnShop{% endblock %}
{% block content %}
<div class="panel">
  <h1>Saved delivery addresses</h1>
  <form method="post">
    <input name="title" placeholder="Home / Office" required>
    <input name="city" placeholder="City" required>
    <input name="street" placeholder="Street and building" required>
    <button class="btn">Save address</button>
  </form>
  <ul>
    {% for a in addresses %}
      <li><strong>{{ a.title }}</strong>: {{ a.city }}, {{ a.street }}</li>
    {% else %}
      <li>No saved addresses yet.</li>
    {% endfor %}
  </ul>
</div>
{% endblock %}
