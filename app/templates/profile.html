{% extends 'base.html' %}
{% block title %}Profile - VulnShop{% endblock %}
{% block content %}
<div class="panel" style="max-width:760px">
  <h1>Profile settings</h1>
  <form method="post">
    <label>Email</label>
    <input name="email" value="{{ user.email }}" type="email" required>
    <label>Bio</label>
    <input name="bio" value="{{ user.bio or '' }}">
    <button class="btn">Save changes</button>
  </form>
</div>
{% endblock %}
