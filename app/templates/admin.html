<!doctype html>
<html>
  <body>
    <h1>Admin Control Panel</h1>
    <p>Only for fully authenticated users.</p>

    <h2>Users</h2>
    <table border="1">
      <tr><th>ID</th><th>Username</th><th>Email</th><th>Role</th></tr>
      {% for u in users %}
      <tr><td>{{u.id}}</td><td>{{u.username}}</td><td>{{u.email}}</td><td>{{u.role}}</td></tr>
      {% endfor %}
    </table>

    <h2>Recent Orders</h2>
    <table border="1">
      <tr><th>ID</th><th>User ID</th><th>Total</th><th>Created</th></tr>
      {% for o in orders %}
      <tr><td>{{o.id}}</td><td>{{o.user_id}}</td><td>{{o.total}}</td><td>{{o.created_at}}</td></tr>
      {% endfor %}
    </table>
  </body>
</html>
