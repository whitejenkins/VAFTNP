services:
  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      - FLASK_SECRET=dev-secret-key
      - MYSQL_HOST=mysql
      - MYSQL_USER=vulnshop
      - MYSQL_PASSWORD=vulnshop
      - MYSQL_DB=vulnshop
      - MONGO_URL=mongodb://mongo:27017
      - ADMIN_OTP=SUPER-ADMIN-OTP
    depends_on:
      - mysql
      - mongo
    volumes:
      - ./app:/app/app

  mysql:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=vulnshop
      - MYSQL_USER=vulnshop
      - MYSQL_PASSWORD=vulnshop
    ports:
      - "3307:3306"
    volumes:
      - ./mysql-init:/docker-entrypoint-initdb.d

  mongo:
    image: mongo:7
    ports:
      - "27018:27017"
